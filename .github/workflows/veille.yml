name: Veille Distressed MASARE

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Lundi–vendredi à 7h UTC (9h heure de Paris)
  workflow_dispatch:
    inputs:
      jours_recul:
        description: 'Nombre de jours à remonter (ex: 60 pour backfill)'
        required: false
        default: '2'

permissions:
  issues: write
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests groq

      - name: Nettoyer les issues obsolètes
        run: python scripts/deduplicate_issues.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: matsaunder/Masare-veille

      - name: Migrer les rapports racine vers rapports/YYYY/MM/
        run: |
          for f in rapport_*.md; do
            if [ -f "$f" ]; then
              annee="${f:8:4}"
              mois="${f:12:2}"
              mkdir -p "rapports/$annee/$mois"
              git mv "$f" "rapports/$annee/$mois/$f"
            fi
          done

      - name: Lancer la veille BODACC
        run: python scripts/bodacc.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: matsaunder/Masare-veille
          PAPPERS_TOKEN: ${{ secrets.PAPPERS_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JOURS_RECUL: ${{ github.event.inputs.jours_recul || '2' }}

      - name: Committer le rapport
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rapports/
          git diff --staged --quiet || git commit -m "Rapport veille MASARE $(date +'%Y-%m-%d')"
          git push
