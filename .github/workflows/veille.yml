name: Veille Distressed MASARE

on:
  schedule:
    - cron: '0 7 * * 1-5'   # Lundi–vendredi à 7h UTC (9h heure de Paris)
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install requests anthropic

      - name: Lancer la veille BODACC
        run: python scripts/bodacc.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: matsaunder/Masare-veille
          PAPPERS_TOKEN: ${{ secrets.PAPPERS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Committer le rapport
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rapport_*.md
          git diff --staged --quiet || git commit -m "Rapport veille MASARE $(date +'%Y-%m-%d')"
          git push
